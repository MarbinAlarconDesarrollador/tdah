<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no
    " />

    <title>🎵 Ritmo Musical Kids</title>

    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
</head>

<body>

    <div class="game">

        <!-- HEADER -->

        <div class="header">

            <div class="title">
                🎵 Ritmo Musical
            </div>

            <div class="stats">

                <div class="stat">

                    <div class="stat-label">
                        Puntaje
                    </div>

                    <div class="stat-value" id="score">
                        0
                    </div>

                </div>

                <div class="stat">

                    <div class="stat-label">
                        Combo
                    </div>

                    <div class="stat-value" id="comboValue">
                        0
                    </div>

                </div>

                <div class="stat">

                    <div class="stat-label">
                        Nivel
                    </div>

                    <div class="stat-value" id="level">
                        1
                    </div>

                </div>

            </div>

        </div>

        <!-- GAME -->

        <div class="game-area">

            <div class="board" id="board">

                <div class="tracks">

                    <div class="track"></div>
                    <div class="track"></div>
                    <div class="track"></div>
                    <div class="track"></div>

                </div>

                <div class="hit-line"></div>

                <div class="combo" id="combo">
                    COMBO!
                </div>

                <div class="message" id="message">
                    PERFECTO
                </div>

                <!-- CONTROLS -->

                <div class="controls">

                    <button class="btn red" data-lane="0">
                        A
                    </button>

                    <button class="btn orange" data-lane="1">
                        S
                    </button>

                    <button class="btn green" data-lane="2">
                        D
                    </button>

                    <button class="btn blue" data-lane="3">
                        F
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
