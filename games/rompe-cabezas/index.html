<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rompecabezas Dinámico - TDAH Kids</title>
<link rel="stylesheet" href="../../global.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="game">

    <div class="header">

        <h1>🧩 Rompecabezas Dinámico</h1>

        <p>
            Juego diseñado para niños con TDAH para fortalecer:
            paciencia, planificación y percepción espacial.
        </p>

        <div class="info">

            <div class="badge">
                ⏱ Tiempo: <span id="time">00</span>s
            </div>

            <div class="badge">
                ✅ Piezas Correctas: <span id="correct">0</span>
            </div>

            <div class="badge">
                🧠 Nivel: <span id="levelText">Fácil</span>
            </div>

        </div>

        <div class="controls">

            <button class="primary" onclick="startGame()">
                🔄 Nuevo Juego
            </button>

            <button class="warning" onclick="shufflePieces()">
                🔀 Mezclar
            </button>

            <button class="success" onclick="toggleGuide()">
                👁 Mostrar/Ocultar Guía
            </button>

        </div>

        <div class="levels">

            <div class="level active" onclick="setLevel(3,this)">
                Fácil 3x3
            </div>

            <div class="level" onclick="setLevel(4,this)">
                Medio 4x4
            </div>

            <div class="level" onclick="setLevel(5,this)">
                Difícil 5x5
            </div>

        </div>

    </div>

    <div class="main">

        <div class="panel">

            <h2>🎯 Tablero</h2>

            <div class="board" id="board"></div>

            <div class="message" id="message"></div>

        </div>

        <div class="panel">

            <h2>🖼 Imagen Guía</h2>

            <div class="preview" id="preview">
                <img
                    src="https://picsum.photos/600"
                    id="guideImage"
                />
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
