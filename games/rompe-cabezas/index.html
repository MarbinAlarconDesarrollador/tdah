<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rompecabezas Dinámico - TDAH Kids</title>

<style>

:root{
    --bg:#F4F7FB;
    --card:#FFFFFF;
    --primary:#4A90E2;
    --success:#10B981;
    --warning:#F59E0B;
    --danger:#EF4444;
    --text:#334155;
    --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#EEF6FF,#F7FBFF);
    min-height:100vh;
    padding:20px;
    color:var(--text);
}

.game{
    max-width:1200px;
    margin:auto;
}

.header{
    background:var(--card);
    padding:25px;
    border-radius:25px;
    box-shadow:var(--shadow);
    margin-bottom:20px;
}

.header h1{
    color:var(--primary);
    font-size:36px;
    margin-bottom:10px;
}

.header p{
    line-height:1.6;
}

.info{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
}

.badge{
    background:#EDF5FF;
    padding:12px 18px;
    border-radius:15px;
    font-weight:bold;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:20px;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 20px;
    border-radius:15px;
    font-size:16px;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.primary{
    background:var(--primary);
    color:white;
}

.warning{
    background:var(--warning);
    color:white;
}

.success{
    background:var(--success);
    color:white;
}

.main{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.panel{
    background:var(--card);
    border-radius:25px;
    box-shadow:var(--shadow);
    padding:20px;
}

.panel h2{
    margin-bottom:15px;
    color:var(--primary);
}

.board{
    width:100%;
    aspect-ratio:1/1;
    display:grid;
    gap:4px;
    background:#DCE9F7;
    border-radius:20px;
    overflow:hidden;
}

.slot{
    background:#F8FBFF;
    border:2px dashed #BFD4EA;
    position:relative;
}

.piece{
    width:100%;
    height:100%;
    background-size:300% 300%;
    cursor:grab;
    transition:.2s;
}

.piece:hover{
    transform:scale(1.03);
}

.dragging{
    opacity:.6;
}

.correct{
    animation:pop .3s;
}

.message{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    min-height:40px;
}

.levels{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

.level{
    background:#EEF2F7;
    padding:10px 15px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.level.active{
    background:var(--primary);
    color:white;
}

.preview{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.preview img{
    width:100%;
    display:block;
}

@keyframes pop{
    0%{transform:scale(.8);}
    100%{transform:scale(1);}
}

@media(max-width:900px){

    .main{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="game">

    <div class="header">

        <h1>🧩 Rompecabezas Dinámico</h1>

        <p>
            Juego diseñado para niños con TDAH para fortalecer:
            paciencia, planificación y percepción espacial.
        </p>

        <div class="info">

            <div class="badge">
                ⏱ Tiempo: <span id="time">00</span>s
            </div>

            <div class="badge">
                ✅ Piezas Correctas: <span id="correct">0</span>
            </div>

            <div class="badge">
                🧠 Nivel: <span id="levelText">Fácil</span>
            </div>

        </div>

        <div class="controls">

            <button class="primary" onclick="startGame()">
                🔄 Nuevo Juego
            </button>

            <button class="warning" onclick="shufflePieces()">
                🔀 Mezclar
            </button>

            <button class="success" onclick="toggleGuide()">
                👁 Mostrar/Ocultar Guía
            </button>

        </div>

        <div class="levels">

            <div class="level active" onclick="setLevel(3,this)">
                Fácil 3x3
            </div>

            <div class="level" onclick="setLevel(4,this)">
                Medio 4x4
            </div>

            <div class="level" onclick="setLevel(5,this)">
                Difícil 5x5
            </div>

        </div>

    </div>

    <div class="main">

        <div class="panel">

            <h2>🎯 Tablero</h2>

            <div class="board" id="board"></div>

            <div class="message" id="message"></div>

        </div>

        <div class="panel">

            <h2>🖼 Imagen Guía</h2>

            <div class="preview" id="preview">
                <img
                    src="https://picsum.photos/600"
                    id="guideImage"
                />
            </div>

        </div>

    </div>

</div>

<script>

const board = document.getElementById("board");
const timeText = document.getElementById("time");
const correctText = document.getElementById("correct");
const message = document.getElementById("message");
const levelText = document.getElementById("levelText");
const preview = document.getElementById("preview");
const guideImage = document.getElementById("guideImage");

let size = 3;
let draggedPiece = null;
let correct = 0;
let time = 0;
let timer;

const images = [
    "https://picsum.photos/id/237/600",
    "https://picsum.photos/id/1025/600",
    "https://picsum.photos/id/1069/600",
    "https://picsum.photos/id/1074/600",
    "https://picsum.photos/id/1084/600"
];

let currentImage = "";

function setLevel(value,el){

    size = value;

    document.querySelectorAll(".level")
        .forEach(btn=>btn.classList.remove("active"));

    el.classList.add("active");

    levelText.innerHTML =
        value === 3 ? "Fácil" :
        value === 4 ? "Medio" :
        "Difícil";

    startGame();
}

function startGame(){

    clearInterval(timer);

    correct = 0;
    time = 0;

    updateUI();

    message.innerHTML = "";

    currentImage = images[
        Math.floor(Math.random()*images.length)
    ];

    guideImage.src = currentImage;

    createBoard();

    timer = setInterval(()=>{
        time++;
        timeText.innerHTML = time;
    },1000);
}

function createBoard(){

    board.innerHTML = "";

    board.style.gridTemplateColumns =
        `repeat(${size},1fr)`;

    let positions = [];

    for(let i=0;i<size*size;i++){
        positions.push(i);
    }

    positions.sort(()=>Math.random() - 0.5);

    positions.forEach((randomPos,index)=>{

        const slot = document.createElement("div");
        slot.className = "slot";

        slot.dataset.index = index;

        slot.addEventListener("dragover",e=>{
            e.preventDefault();
        });

        slot.addEventListener("drop",dropPiece);

        const piece = document.createElement("div");

        piece.className = "piece";

        piece.draggable = true;

        piece.dataset.correct = index;
        piece.dataset.current = randomPos;

        piece.style.backgroundImage =
            `url(${currentImage})`;

        piece.style.backgroundSize =
            `${size*100}% ${size*100}%`;

        const x = randomPos % size;
        const y = Math.floor(randomPos / size);

        piece.style.backgroundPosition =
            `${(x/(size-1))*100}% ${(y/(size-1))*100}%`;

        piece.addEventListener("dragstart",()=>{

            draggedPiece = piece;

            piece.classList.add("dragging");
        });

        piece.addEventListener("dragend",()=>{

            piece.classList.remove("dragging");
        });

        slot.appendChild(piece);

        board.appendChild(slot);

    });

    checkBoard();
}

function dropPiece(){

    const targetPiece = this.querySelector(".piece");

    if(!targetPiece || !draggedPiece) return;

    const parent1 = draggedPiece.parentNode;
    const parent2 = targetPiece.parentNode;

    parent1.appendChild(targetPiece);
    parent2.appendChild(draggedPiece);

    checkBoard();
}

function checkBoard(){

    correct = 0;

    const pieces = document.querySelectorAll(".piece");

    pieces.forEach(piece=>{

        const slotIndex =
            parseInt(piece.parentNode.dataset.index);

        const correctIndex =
            parseInt(piece.dataset.current);

        if(slotIndex === correctIndex){

            piece.classList.add("correct");

            correct++;

        }else{

            piece.classList.remove("correct");
        }

    });

    updateUI();

    if(correct === size*size){

        clearInterval(timer);

        message.innerHTML = `
            🏆 ¡Excelente trabajo!
            Completaste el rompecabezas.
        `;
    }
}

function shufflePieces(){
    createBoard();
}

function toggleGuide(){

    if(preview.style.display === "none"){

        preview.style.display = "block";

    }else{

        preview.style.display = "none";
    }
}

function updateUI(){

    correctText.innerHTML =
        `${correct}/${size*size}`;

    timeText.innerHTML = time;
}

startGame();

</script>

</body>
</html>
