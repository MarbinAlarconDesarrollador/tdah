<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Busca y Encuentra - TDAH Kids</title>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">

        <div class="header">
            <h1>🔍 Busca y Encuentra</h1>

            <p>
                Juego diseñado para niños con TDAH para mejorar:
                atención selectiva, discriminación visual y persistencia.
            </p>

            <div class="info">
                <div class="badge">
                    🎯 Encuentra: <span id="targetEmoji">⭐</span>
                </div>

                <div class="badge">
                    ✅ Encontrados: <span id="score">0</span>
                </div>

                <div class="badge">
                    ⏱ Tiempo: <span id="time">60</span>s
                </div>
            </div>

            <div class="controls">
                <button class="primary" onclick="startGame()">
                    🔄 Nuevo Juego
                </button>

                <button class="warning" onclick="changeMode()">
                    🎨 Cambiar Modo
                </button>
            </div>

            <div class="levels">
                <div class="level active" onclick="setLevel(1,this)">Fácil</div>
                <div class="level" onclick="setLevel(2,this)">Medio</div>
                <div class="level" onclick="setLevel(3,this)">Difícil</div>
            </div>
        </div>

        <div class="board">
            <div class="grid" id="grid"></div>

            <div class="message" id="message"></div>
        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
