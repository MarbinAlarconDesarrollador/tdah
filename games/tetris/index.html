<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusPlay - Tetris Pro</title>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="game-wrapper">

        <div class="main-game-area">
            <canvas id="tetris" width="360" height="600"></canvas>

            <div class="mobile-controls">
                <button class="m-btn" id="btn-left">⬅️</button>
                <button class="m-btn" id="btn-rotate">🔃</button>
                <button class="m-btn" id="btn-right">➡️</button>
                <button class="m-btn" id="btn-down" style="grid-column: span 3;">⬇️ Bajar Rápido</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="box">
                <h2>PUNTOS</h2>
                <div id="score" class="val">0</div>
            </div>
            <div class="box">
                <h2>NIVEL</h2>
                <div id="level" class="val">1</div>
            </div>
            <div class="box">
                <h2>SIGUIENTE</h2>
                <canvas id="next" width="120" height="120"></canvas>
            </div>

            <button id="btn-pause" class="btn-pause">⏸️ Pausa</button>

            <button class="btn-pause">
                <a href="../../index.html" style="text-decoration: none; color: black;">← Volver</a>
            </button>

            <div class="controls-hint box" style="border-color: #666; color: #ccc;">
                <strong>PC Controles:</strong><br>
                Flechas: Mover / Bajar<br>
                Q - W: Rotar
            </div>
        </div>

    </div>

    <script src="tetris.js"></script>
</body>

</html>
