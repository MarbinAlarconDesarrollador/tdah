<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusPlay</title>
    <link rel="stylesheet" href="global.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <header>
        <h1>FocusPlay</h1>
        <p>Aprender jugando, a tu ritmo</p>
    </header>

    <main class="dashboard-grid">
        <a href="games/charadas/index.html" class="game-card charadas">
            <div class="game-icon">
                <img src="./assets/charadas.png" alt="Charadas Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Charadas</div>
        </a>

        <a href="games/respiracion/index.html" class="game-card respiracion">
            <div class="game-icon">
                <img src="./assets/respiracion.png" alt="Respiración Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Respiración</div>
        </a>

        <a href="games/memoria/index.html" class="game-card memoria">
            <div class="game-icon">
                <img src="./assets/memoria.png" alt="Memoria Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Memorama</div>
        </a>

        <a href="games/conecta-cuatro/index.html" class="game-card conecta-cuatro">
            <div class="game-icon">
                <img src="./assets/conecta-cuatro.png" alt="Conecta Cuatro Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Conecta Cuatro</div>
        </a>

        <a href="games/tetris/index.html" class="game-card tetris">
            <div class="game-icon">
                <img src="./assets/tetris.png" alt="Tetris Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Tetris</div>
        </a>

        <a href="games/torre/index.html" class="game-card torre">
            <div class="game-icon">
                <img src="./assets/torre.png" alt="Torres de Hanoi Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Torres de Hanoi</div>
        </a>

        <a href="games/peliculas/index.html" class="game-card peliculas">
            <div class="game-icon">
                <img src="./assets/peliculas.png" alt="Peliculas Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Adivina las Películas</div>
        </a>

        <a href="games/verbos/index.html" class="game-card verbos">
            <div class="game-icon">
                <img src="./assets/verbos.png" alt="Verbos Icon" style="width: 60px; height: 60px;">
            </div>
            <div class="game-title">Adivina los Verbos</div>
        </a>

        <a href="games/sudoku/index.html" class="game-card sudoku">
            <div class="game-icon">
                <img src="./assets/sudoku.png" alt="Sudoku Icon" style="width: 70px; height: 70px;">
            </div>
            <div class="game-title">Sudoku</div>
        </a>

         <a href="games/wordle/index.html" class="game-card wordle">
            <div class="game-icon">
                <img src="./assets/wordle.png" alt="Wordle Icon" style="width: 70px; height: 70px;">
            </div>
            <div class="game-title">Wordle</div>
        </a>
    </main>



    <script src="dashboard.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado correctamente', reg))
                    .catch(err => console.log('Error al registrar SW', err));
            });
        }
    </script>
</body>

</html>
